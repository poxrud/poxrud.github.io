<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
<head>
  <meta charset="UTF-8" />
  <meta id="viewport" name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
  <title>Web Development Blog by Phil Oxrud</title>
  <meta name="description" content="{{ site.description }}"/>
  <link href="https://fonts.googleapis.com/css?family=Arvo" rel="stylesheet">
  <link rel="stylesheet" href="{{ site.baseurl }}/css/main.css?{{ site.time | date: '%s%N' }}">
  {% include icons-svgs.html %}
</head>

<body>
    <div class="hero">
      <p class="hero__headline">Web Development<span class="hero__subheadline">blog</span></p>

          <img class="rounded-img" src="/assets/philoxrud.jpg"  class="avatar" />
          <div>
            <h3>Phil Oxrud</h3>
            <div class="social-icons">
              {% include icon-twitter.html %}
              {% include icon-github.html %}
            </div>
          </div>
        </div>
        <ul class="nav">
          <li><a href="/">Posts</a></li>
          <li><a href="/about.html">About</a></li>
        </ul>
      </section>
      <main class="content">
          {{ content }}
      </main>
    </div>
  </div>

<footer>
  {% include footer.html %} 
</footer>

</body>
</html>
